
<div  container ng-controller="cityCenterController"> 

    <h2 class='starttitle'>Main Insurance Menu</h2> 
 
    <div class="row">   
         <img class='mainPic' src='images/lake.jpg'>  
   </div>
   <br>

<div class="row" style= "margin-left: '140px'">  
  
   
    <div class='col-md-2'></div>
    <div class='col-md-2'> 

            <button type='button' class='st1 b1  btn btn-primary' ng-click="update()">
                            Update Info
            </button> 
    </div> 

    <div class='col-md-2'> 

        <button type='button' class='st1 b1 btn btn-primary' ng-click="claim()">
                        File Claim
        </button> 
    </div> 

    <div class='col-md-2'> 

        <button type='button' class='st1 b1 btn btn-primary' ng-click="history()">
                        Show History
        </button> 
    </div> 

    <div class='col-md-2'> 

        <button type='button' class='st1 b1 btn btn-primary' ng-click="plan()">
                        Change Plan
        </button> 
    </div> 

    <div class='col-md-2'> 

        <button type='button' class='st1 b1 btn btn-primary' ng-click="signout()">
                        Signout
        </button> 
    </div> 

</div>

<br>
<div class="row" style="margin-left: '140px'">
             <div class='col-md-5'></div>
             <div class='col-md-5'> 
                    {{message}}    
             </div>
</div>

</div>
